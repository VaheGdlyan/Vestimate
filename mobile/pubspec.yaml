name: vestimate
description: "A premium mobile application for wardrobe management and AI outfit recommendations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  dio: ^5.4.1
  supabase_flutter: ^2.4.0
  flutter_secure_storage: ^9.0.0
  rive: ^0.13.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  hive_ce: ^2.0.0
  hive_ce_flutter: ^2.0.0
  flutter_animate: ^4.5.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/luxury_bg.png
